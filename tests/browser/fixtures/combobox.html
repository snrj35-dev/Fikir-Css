<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Combobox fixture</title>
  <link rel="stylesheet" href="../../../dist/fikir.css" />
</head>
<body style="padding: 2rem">
  <label class="label" for="combo-input">Country</label>
  <div class="combobox" id="combobox">
    <input
      id="combo-input"
      class="combobox-input input"
      type="text"
      role="combobox"
      aria-expanded="false"
      aria-haspopup="listbox"
      aria-controls="combo-list"
      aria-autocomplete="list"
      autocomplete="off"
      placeholder="Search countries..."
    />
    <ul
      id="combo-list"
      class="combobox-list"
      role="listbox"
      aria-label="Countries"
      hidden
    >
      <li id="opt-1" class="combobox-option" role="option" aria-selected="false" tabindex="-1">France</li>
      <li id="opt-2" class="combobox-option" role="option" aria-selected="false" tabindex="-1">Germany</li>
      <li id="opt-3" class="combobox-option" role="option" aria-selected="false" tabindex="-1">Japan</li>
      <li id="opt-4" class="combobox-option" role="option" aria-selected="false" tabindex="-1">Turkey</li>
      <li id="opt-5" class="combobox-option" role="option" aria-selected="false" tabindex="-1">United Kingdom</li>
    </ul>
  </div>

  <script>
    const input   = document.getElementById('combo-input');
    const list    = document.getElementById('combo-list');
    const options = [...list.querySelectorAll('[role="option"]')];
    let activeIdx = -1;

    function openList() {
      list.removeAttribute('hidden');
      input.setAttribute('aria-expanded', 'true');
    }

    function closeList() {
      list.setAttribute('hidden', '');
      input.setAttribute('aria-expanded', 'false');
      input.removeAttribute('aria-activedescendant');
      activeIdx = -1;
      options.forEach(o => o.removeAttribute('data-active'));
    }

    function setActive(idx) {
      options.forEach((o, i) => {
        if (i === idx) {
          o.dataset.active = 'true';
          input.setAttribute('aria-activedescendant', o.id);
        } else {
          delete o.dataset.active;
        }
      });
      activeIdx = idx;
    }

    function selectOption(opt) {
      options.forEach(o => o.setAttribute('aria-selected', 'false'));
      opt.setAttribute('aria-selected', 'true');
      input.value = opt.textContent.trim();
      closeList();
      input.focus();
    }

    input.addEventListener('focus', openList);
    input.addEventListener('input', openList);
    input.addEventListener('blur', (e) => {
      if (!list.contains(e.relatedTarget)) closeList();
    });

    input.addEventListener('keydown', (e) => {
      if (!list.hasAttribute('hidden')) {
        if (e.key === 'ArrowDown') {
          e.preventDefault(); setActive(Math.min(activeIdx + 1, options.length - 1));
        } else if (e.key === 'ArrowUp') {
          e.preventDefault(); setActive(Math.max(activeIdx - 1, 0));
        } else if (e.key === 'Enter' && activeIdx >= 0) {
          e.preventDefault(); selectOption(options[activeIdx]);
        } else if (e.key === 'Escape') {
          closeList();
        }
      }
    });

    options.forEach((opt) => {
      opt.addEventListener('mousedown', (e) => { e.preventDefault(); selectOption(opt); });
    });
  </script>
</body>
</html>
