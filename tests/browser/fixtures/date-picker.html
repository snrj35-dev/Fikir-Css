<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Date picker fixture</title>
  <link rel="stylesheet" href="../../../dist/fikir.css" />
</head>
<body style="padding: 2rem">
  <label class="label" for="date-input">Appointment date</label>
  <div class="date-picker" id="date-picker">
    <input
      id="date-input"
      class="date-picker-input input"
      type="text"
      placeholder="YYYY-MM-DD"
      aria-label="Appointment date"
      aria-haspopup="grid"
      aria-expanded="false"
      aria-controls="calendar-grid"
      autocomplete="off"
      readonly
    />
    <button
      id="calendar-trigger"
      class="date-picker-trigger btn btn-ghost btn-sm"
      aria-label="Open calendar"
      aria-expanded="false"
      aria-controls="calendar-grid"
      type="button"
    >
      📅
    </button>
    <div
      id="calendar-grid"
      class="date-picker-panel"
      role="dialog"
      aria-label="Calendar"
      aria-modal="true"
      hidden
    >
      <div class="date-picker-grid" role="grid" aria-label="April 2026">
        <div role="rowgroup">
          <div role="row">
            <span role="columnheader" aria-label="Sunday">Su</span>
            <span role="columnheader" aria-label="Monday">Mo</span>
            <span role="columnheader" aria-label="Tuesday">Tu</span>
            <span role="columnheader" aria-label="Wednesday">We</span>
            <span role="columnheader" aria-label="Thursday">Th</span>
            <span role="columnheader" aria-label="Friday">Fr</span>
            <span role="columnheader" aria-label="Saturday">Sa</span>
          </div>
        </div>
        <div id="calendar-body" role="rowgroup">
          <!-- Rows generated by JS -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const picker  = document.getElementById('date-picker');
    const input   = document.getElementById('date-input');
    const trigger = document.getElementById('calendar-trigger');
    const panel   = document.getElementById('calendar-grid');
    const body    = document.getElementById('calendar-body');

    let focusedDate = new Date(2026, 3, 1); // April 1 2026

    function renderCalendar(month, year) {
      body.innerHTML = '';
      const first   = new Date(year, month, 1).getDay();
      const daysIn  = new Date(year, month + 1, 0).getDate();
      let row = document.createElement('div');
      row.setAttribute('role', 'row');
      for (let i = 0; i < first; i++) {
        const empty = document.createElement('span');
        empty.setAttribute('role', 'gridcell');
        row.appendChild(empty);
      }
      for (let d = 1; d <= daysIn; d++) {
        if ((first + d - 1) % 7 === 0 && d > 1) {
          body.appendChild(row);
          row = document.createElement('div');
          row.setAttribute('role', 'row');
        }
        const cell = document.createElement('button');
        cell.className = 'date-picker-day';
        cell.setAttribute('role', 'gridcell');
        cell.setAttribute('aria-label', `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
        cell.setAttribute('data-date', `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
        cell.setAttribute('tabindex', d === focusedDate.getDate() ? '0' : '-1');
        cell.textContent = d;
        cell.type = 'button';
        cell.addEventListener('click', () => selectDate(cell.dataset.date));
        row.appendChild(cell);
      }
      body.appendChild(row);
    }

    function openCalendar() {
      renderCalendar(focusedDate.getMonth(), focusedDate.getFullYear());
      panel.removeAttribute('hidden');
      picker.dataset.open = 'true';
      trigger.setAttribute('aria-expanded', 'true');
      input.setAttribute('aria-expanded', 'true');
      panel.querySelector('[tabindex="0"]')?.focus();
    }

    function closeCalendar() {
      panel.setAttribute('hidden', '');
      delete picker.dataset.open;
      trigger.setAttribute('aria-expanded', 'false');
      input.setAttribute('aria-expanded', 'false');
      trigger.focus();
    }

    function selectDate(dateStr) {
      input.value = dateStr;
      closeCalendar();
    }

    trigger.addEventListener('click', () => {
      panel.hasAttribute('hidden') ? openCalendar() : closeCalendar();
    });

    panel.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeCalendar();
      const days = [...body.querySelectorAll('.date-picker-day')];
      const idx  = days.indexOf(document.activeElement);
      if (e.key === 'ArrowRight' && idx < days.length - 1) { e.preventDefault(); days[idx + 1].focus(); }
      if (e.key === 'ArrowLeft'  && idx > 0)               { e.preventDefault(); days[idx - 1].focus(); }
      if (e.key === 'ArrowDown'  && idx + 7 < days.length) { e.preventDefault(); days[idx + 7].focus(); }
      if (e.key === 'ArrowUp'    && idx - 7 >= 0)           { e.preventDefault(); days[idx - 7].focus(); }
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (document.activeElement.dataset.date) selectDate(document.activeElement.dataset.date);
      }
    });
  </script>
</body>
</html>
