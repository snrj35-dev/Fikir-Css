name: foundation-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  browser-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright browser tests
        run: npm run test:browser

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/browser/report/
          retention-days: 7

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run full CI test suite
        run: npm run test:ci

      - name: Validate gzip size thresholds
        run: npm run validate:size

      - name: Report CSS size diff
        if: always()
        run: npm run report:size

      - name: Install Firefox (for screenshots)
        if: always() && matrix.node-version == '22'
        run: |
          which firefox || (sudo apt-get update -qq && sudo apt-get install -y -qq firefox)
        continue-on-error: true

      - name: Capture playground screenshots
        if: always() && matrix.node-version == '22'
        run: npm run capture:playground
        env:
          FIREFOX_BIN: firefox
          SCREENSHOT_VIEWPORT: "1440,2200"
        continue-on-error: true

      - name: Visual regression gate
        if: always() && matrix.node-version == '22'
        run: |
          if [ ! -d "playground/screenshots/baseline" ]; then
            echo "No baseline — creating initial baseline."
            node scripts/diff-playground-screenshots.mjs --update-baseline
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Main branch push — updating baseline to reflect intentional changes."
            node scripts/diff-playground-screenshots.mjs --update-baseline
            node scripts/diff-playground-screenshots.mjs
          else
            echo "Pull request — strict regression check."
            node scripts/diff-playground-screenshots.mjs --strict
          fi
