name: publish-npm

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build CSS bundle
        run: npm run build

      - name: Run CI test suite
        run: npm run test:ci

      - name: Determine release channel
        id: release
        run: |
          VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [[ "$VERSION" == *"-beta."* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-rc."* ]]; then
            echo "channel=rc" >> "$GITHUB_OUTPUT"
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify publish (dry run)
        env:
          RELEASE_CHANNEL: ${{ steps.release.outputs.channel }}
        run: |
          if [ "$RELEASE_CHANNEL" = "latest" ]; then
            npm publish --dry-run --access public
          else
            npm publish --dry-run --access public --tag "$RELEASE_CHANNEL"
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_CHANNEL: ${{ steps.release.outputs.channel }}
        run: |
          if [ "$RELEASE_CHANNEL" = "latest" ]; then
            npm publish --provenance --access public
          else
            npm publish --provenance --access public --tag "$RELEASE_CHANNEL"
          fi
