<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fikir CSS Starter Consumer</title>
    <link rel="stylesheet" href="./node_modules/fikir-css-mvp/dist/fikir.css" />
  </head>
  <body class="surface p-4">
    <main class="stack" style="gap: var(--space-4)">
      <h1 class="heading-2">Starter Consumer</h1>
      <p class="text-muted">This page consumes the packaged dist CSS output.</p>

      <div class="field" style="max-width: 24rem">
        <label class="label" for="starter-email">Email</label>
        <input id="starter-email" class="input" type="email" placeholder="name@example.com" />
        <p class="helper-text">Canonical field + input + helper-text usage.</p>
      </div>

      <div class="cluster" style="gap: var(--space-2)">
        <button class="button">Primary action</button>
        <span class="badge">v0.3 package</span>
      </div>
    </main>
  </body>
</html>
